<!-- Sign-up Page (signup.html) -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Car Showroom</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="../Style_css/forsig.css" rel="stylesheet">
</head>
<body>
    <div class="signup-container" id="signupBox">
        <h3 class="text-center" style="color: #000;">Sign Up</h3>
        <form action="../php/signup.php" method="POST">
            <div class="mb-3">
                <label class="form-label"><b>Email</b></label>
                <input type="email" name="email" placeholder="Enter your email" class="form-control" id="email" required>
            </div>
            <div class="mb-3">
                <label class="form-label"><b>Password</b></label>
                <input type="password" name="password" placeholder="Enter your password" class="form-control" id="password" required>
            </div>
            <div class="mb-3">
                <label for="phone_number" class="form-label"><b>Phone Number</b></label>
                <input type="text" name="phone_number" class="form-control" id="phone_number" placeholder="Enter your Phone Number" required>
            </div>
            <button type="submit" class="btn btn-success w-100">Sign Up</button>
        </form>
        <div class="mt-3 text-center">
            <a href="login.html" style="color:blue; display: flex; background-color: white; justify-content: center; width: 300px; margin-right: auto; margin-left: auto; border-radius: 50px;">Already have an account? Login</a>
        </div>
    </div>
    <script src="../Main_js/signup.js"></script>
</body>
</html>
